services:
  neo4j-m3:
    image: neo4j:5.26.28-community
    container_name: graphrag-neo4j-m3
    restart: "no"
    ports:
      - "127.0.0.1:7475:7474"
      - "127.0.0.1:7688:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "2g"
      NEO4J_server_memory_pagecache_size: "512m"
      NEO4J_server_jvm_additional: "--add-modules jdk.incubator.vector"
    volumes:
      - neo4j-m3-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${NEO4J_AUTH#neo4j/}\" 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

volumes:
  neo4j-m3-data:
    name: graphrag-neo4j-m3-data
