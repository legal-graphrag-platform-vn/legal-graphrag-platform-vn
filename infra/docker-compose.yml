services:
  neo4j:
    image: neo4j:5.15-community
    container_name: graphrag-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # Browser UI
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt protocol (driver)
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      # APOC — tự download khi khởi động (cần internet lần đầu)
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      # Memory — phù hợp cho dev (máy có ≥8GB RAM)
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "2g"
      NEO4J_server_memory_pagecache_size: "512m"
      # Cho phép vector index (mặc định bật từ 5.11+)
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      # Tắt TLS cho local dev — tránh lỗi "neo4j+s://" scheme
      NEO4J_dbms_connector_bolt_tls__level: "DISABLED"
      # Log level
      NEO4J_dbms_logs_query_enabled: "INFO"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/import:/var/lib/neo4j/import
      - ./data/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

networks:
  default:
    name: graphrag-network
