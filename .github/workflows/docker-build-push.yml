name: Build and Push Docker Image to GHCR

on:
  push:
    branches:
      - main
    # Có thể uncomment phần tag bên dưới nếu bạn muốn build khi tạo release/tag mới
    # tags:
    #   - 'v*'
  workflow_dispatch: # Cho phép trigger bằng tay từ giao diện GitHub

env:
  REGISTRY: ghcr.io
  # Mặc định lấy tên repo của bạn (ví dụ: lamdx4/legal-graphrag-platform-vn)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    
    permissions:
      contents: read
      packages: write
      id-token: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=sha,format=short
            type=ref,event=tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.component }}
          file: ./apps/${{ matrix.component }}/Dockerfile 
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
